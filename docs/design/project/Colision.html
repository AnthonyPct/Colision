<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1400"/>
  <title>Colision — Design hi-fi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #0E1310;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #F0EBE0;
      min-height: 100vh;
    }
    button { font-family: inherit; }
    input { font-family: inherit; }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }
    /* hide scrollbars in device frame content for cleanliness */
    .colision-frame ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Device frames + tweaks panel (load first) -->
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Design system + data -->
  <script type="text/babel" src="tokens.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" src="screens-onboarding.jsx"></script>
  <script type="text/babel" src="screens-agenda.jsx"></script>
  <script type="text/babel" src="screens-meeting.jsx"></script>
  <script type="text/babel" src="screens-arbitrage.jsx"></script>

  <!-- App shell + host -->
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="host.jsx"></script>

  <script type="text/babel" data-presets="react">
    // Wait for all babel scripts to register their globals before mounting.
    function mountWhenReady() {
      if (typeof Host === 'function') {
        ReactDOM.createRoot(document.getElementById('root')).render(<Host/>);
      } else {
        setTimeout(mountWhenReady, 30);
      }
    }
    mountWhenReady();
  </script>
</body>
</html>
