name: Build Android

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble development debug APK
        run: ./gradlew :composeApp:assembleDevelopmentDebug --no-configuration-cache

      - name: Run Android unit tests (development debug)
        run: ./gradlew :composeApp:testDevelopmentDebugUnitTest --no-configuration-cache

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: composeApp/build/reports/tests/**
          retention-days: 7
